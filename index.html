<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate VIP Bot Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0b0c10; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #1f2833; border-right: 2px solid #45a29e; display: flex; flex-direction: column; z-index: 10;}
        .sidebar-header { padding: 15px; font-family: 'Orbitron'; color: #66fcf1; text-align: center; border-bottom: 1px solid #45a29e; font-size: 16px; font-weight: 900;}
        .channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-tab { background: #0b0c10; border: 1px solid #45a29e; padding: 10px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; text-align: left; font-weight: bold; transition: 0.3s; font-size: 13px; display: flex; align-items: center; gap: 8px;}
        .channel-tab.active { background: #66fcf1; color: #0b0c10; box-shadow: 0 0 15px rgba(102, 252, 241, 0.5); }
        .add-btn { background: linear-gradient(135deg, #66fcf1, #45a29e); color: #000; margin: 10px; padding: 10px; border-radius: 8px; text-align: center; font-weight: 900; cursor: pointer; border: none; font-size: 14px;}
        .main-content { flex: 1; padding: 20px; overflow-y: auto; background: radial-gradient(circle at top right, #1f2833, #0b0c10); }
        .header-status { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #111; padding: 15px; border-radius: 10px; border: 2px solid #333; font-size: 14px;}
        .bot-status { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; text-shadow: 0 0 10px rgba(255,255,255,0.2);}
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #66fcf1; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #45a29e; color: #fff; border-radius: 8px; outline: none; font-size: 13px;}
        input[readonly] { background: #1a1a1a; color: #00ff41; font-weight: bold; border-color: #333; cursor: not-allowed;}
        textarea { height: 60px; resize: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .card { background: rgba(31, 40, 51, 0.8); padding: 15px; border-radius: 10px; border: 1px dashed #45a29e; margin-bottom: 15px; position: relative;}
        .card h3 { font-family: 'Orbitron'; color: #ffd700; margin-bottom: 15px; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center;}
        .card.small h3 { color: #00e5ff; }
        .card.loss h3 { color: #ff0055; }
        .card.target h3 { color: #ffaa00; }
        .card.alert h3 { color: #ff55ff; }
        .btn { padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-test { background: #0088cc; color: white; margin-top: 10px; width: 100%; }
        .btn-reset { background: #ffaa00; color: #000; padding: 10px; }
        .save-btn { width: 100%; padding: 15px; background: #00ff41; color: #000; font-size: 16px; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;}
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ff003c; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ff41; }
        input:checked + .slider:before { transform: translateX(16px); }
        .time-box-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .time-box { display: flex; flex-direction: column; gap: 5px; background: #000; padding: 8px; border-radius: 8px; border: 1px solid #333; text-align: center;}
        .time-box b { font-size: 10px; color: #aaa;}
        .time-box input { padding: 4px; font-size: 10px; text-align: center;}
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 2px solid #45a29e; display: block;}
            .channel-list { display: flex; flex-direction: row; overflow-x: auto; white-space: nowrap; padding: 10px; }
            .channel-tab { display: inline-block; min-width: 140px; margin-right: 10px; margin-bottom: 0; }
            .main-content { overflow: visible; padding: 10px; }
            .grid-2, .grid-3, .time-box-container { grid-template-columns: 1fr; }
            .header-status { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><i class="fas fa-robot"></i> ADMIN PANEL</div>
        <div class="channel-list" id="channelList"></div>
        <button class="add-btn" id="addChannelBtn"><i class="fas fa-plus"></i> ADD NEW CHANNEL</button>
    </div>
    <div class="main-content" id="mainContent" style="display: none;">
        <div class="header-status">
            <div>
                <label style="color:#aaa;">Editing Channel:</label>
                <input type="text" id="f_channelName" style="width: 200px; padding: 5px; font-weight: bold; font-size: 16px; border-color: #66fcf1; background: transparent;">
            </div>
            <div id="channelStatusBadge" class="bot-status"></div>
        </div>
        <div class="card">
            <h3>API & SERVER SETTINGS <label class="switch" title="Bot ON/OFF"><input type="checkbox" id="f_isActive"><span class="slider"></span></label></h3>
            <div class="grid-3">
                <div class="form-group"><label>Select Server</label>
                    <select id="f_server">
                        <option value="30S">WINGO 30 SECONDS</option>
                        <option value="1M">WINGO 1 MINUTE</option>
                        <option value="3M">WINGO 3 MINUTES</option>
                        <option value="5M">WINGO 5 MINUTES</option>
                    </select>
                </div>
                <div class="form-group"><label>Bot Token</label><input type="text" id="f_botToken" placeholder="7123456:AAH..."></div>
                <div class="form-group"><label>Channel ID</label><input type="text" id="f_chatId" placeholder="-100123456789"></div>
            </div>
            <button class="btn btn-test" id="testConnectionBtn"><i class="fab fa-telegram"></i> Check Connection (Send Test Msg)</button>
            <div class="form-group" style="margin-top: 15px;">
                <label>Signal Message Template (Use {period} and {signal})</label>
                <textarea id="f_signalMsg">🎮 Period: {period}&#10;🔮 Prediction: {signal}&#10;💸 Investment: 1X</textarea>
            </div>
        </div>
        <div class="card target">
            <h3>🎯 AUTO STOP BOT BY WINS <label class="switch"><input type="checkbox" id="f_stopOnWinTarget"><span class="slider"></span></label></h3>
            <div class="grid-2">
                <div class="form-group"><label>1. Target Goal (e.g. Stop after 4 wins)</label><input type="number" id="f_targetWins" value="4"></div>
                <div class="form-group"><label>2. Live Status</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="f_currentWins" readonly value="0">
                        <button class="btn btn-reset" id="resetWinsBtn"><i class="fas fa-redo"></i> Reset</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card alert">
            <h3>🔔 SESSION ALERTS & NOTIFICATIONS</h3>
            <div class="form-group">
                <label>Warning Message (Sent 30 mins before time-box starts)</label>
                <input type="text" id="f_warningMsg" placeholder="⏳ Get Ready! Signals will start in 30 minutes...">
            </div>
            <div class="form-group">
                <label>Session End Message (Sent when bot auto-stops after wins/time)</label>
                <input type="text" id="f_endMsg" placeholder="✅ Today's target achieved! See you in the next session.">
            </div>
        </div>
        <div class="card">
            <h3>🏆 BIG WIN SETTINGS</h3>
            <div class="form-group"><label>Big Win Message</label><input type="text" id="f_bigMsg" value="✅ WIN (BIG)!"></div>
            <div class="grid-3">
                <div class="form-group"><label>Sticker 1</label><input type="text" id="f_bSticker1"></div>
                <div class="form-group"><label>Sticker 2</label><input type="text" id="f_bSticker2"></div>
                <div class="form-group"><label>Sticker 3</label><input type="text" id="f_bSticker3"></div>
            </div>
        </div>
        <div class="card small">
            <h3>🏆 SMALL WIN SETTINGS</h3>
            <div class="form-group"><label>Small Win Message</label><input type="text" id="f_smallMsg" value="✅ WIN (SMALL)!"></div>
            <div class="grid-3">
                <div class="form-group"><label>Sticker 1</label><input type="text" id="f_sSticker1"></div>
                <div class="form-group"><label>Sticker 2</label><input type="text" id="f_sSticker2"></div>
                <div class="form-group"><label>Sticker 3</label><input type="text" id="f_sSticker3"></div>
            </div>
        </div>
        <div class="card loss">
            <h3>❌ LOSS SETTINGS <label style="display:flex; align-items:center; gap:5px; color:#fff; font-size:11px;"> Send Loss? <div class="switch"><input type="checkbox" id="f_sendLoss"><span class="slider"></span></div></label></h3>
            <div class="grid-2">
                <div class="form-group"><label>Loss Message</label><input type="text" id="f_lossMsg" value="❌ LOSS!"></div>
                <div class="form-group"><label>Loss Sticker</label><input type="text" id="f_lossSticker"></div>
            </div>
        </div>
        <div class="card">
            <h3>⏰ SMART TIME SCHEDULE</h3>
            <label>Leave empty if 24/7. Format: 24 Hour (e.g. 14:30)</label>
            <div class="time-box-container" id="timeBoxesContainer"></div>
        </div>
        <button class="save-btn" id="saveBtn"><i class="fas fa-save"></i> SAVE CHANNEL SETTINGS</button>
        <button class="save-btn" id="deleteBtn" style="background:#ff003c; margin-top:10px; color:#fff;"><i class="fas fa-trash"></i> DELETE CHANNEL</button>
    </div>

    <!-- FIREBASE SDK & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRDaqKIi2P5Jww0zW0Gdxm2_QXtYmHOQE",
            authDomain: "sihol-3624d.firebaseapp.com",
            databaseURL: "https://sihol-3624d-default-rtdb.firebaseio.com",
            projectId: "sihol-3624d",
            storageBucket: "sihol-3624d.firebasestorage.app",
            messagingSenderId: "844300820855",
            appId: "1:844300820855:web:5d810714448b0e1aff8172"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const channelsRef = ref(db, 'channels');

        let channelsData = {};
        let currentEditingId = null;

        let tbHtml = "";
        for(let i=0; i<10; i++) {
            tbHtml += `<div class="time-box"><b>BOX ${i+1}</b>
            <input type="time" id="f_t_start_${i}">
            <input type="time" id="f_t_end_${i}"></div>`;
        }
        document.getElementById('timeBoxesContainer').innerHTML = tbHtml;

        onValue(channelsRef, (snapshot) => {
            channelsData = snapshot.val() || {};
            renderSidebar();
            if (currentEditingId && channelsData[currentEditingId]) {
                const c = channelsData[currentEditingId];
                document.getElementById('f_isActive').checked = c.isActive;
                document.getElementById('f_currentWins').value = c.currentWins || 0;
                checkStatus();
            }
        });

        function renderSidebar() {
            const list = document.getElementById('channelList');
            list.innerHTML = "";
            for (let key in channelsData) {
                let data = channelsData[key];
                let name = data.name || "Unnamed Channel";
                let statusColor = data.isActive ? "#00ff41" : "#ff003c";
                let serverBadge = `<span style="background:#333; padding:2px 5px; border-radius:4px; font-size:10px; color:#ffd700;">${data.server}</span>`;
                
                list.innerHTML += `<div class="channel-tab ${currentEditingId === key ? 'active' : ''}" onclick="window.selectChannel('${key}')">
                    <span style="color:${statusColor}; font-size: 16px;">●</span> 
                    <div style="flex:1; overflow:hidden; text-overflow:ellipsis;">${name}</div>
                    ${serverBadge}
                </div>`;
            }
        }

        window.selectChannel = (id) => {
            currentEditingId = id;
            document.getElementById('mainContent').style.display = 'block';
            const data = channelsData[id];
            
            document.getElementById('f_channelName').value = data.name || 'New Channel';
            document.getElementById('f_server').value = data.server || '30S';
            document.getElementById('f_isActive').checked = data.isActive ?? false;
            document.getElementById('f_botToken').value = data.botToken || '';
            document.getElementById('f_chatId').value = data.chatId || '';
            document.getElementById('f_signalMsg').value = data.signalMsg || '🎮 Period: {period}\n🔮 Prediction: {signal}\n💸 Investment: 1X';
            
            document.getElementById('f_stopOnWinTarget').checked = data.stopOnWinTarget ?? false;
            document.getElementById('f_targetWins').value = data.targetWins || 4;
            document.getElementById('f_currentWins').value = data.currentWins || 0;

            document.getElementById('f_warningMsg').value = data.warningMsg || '';
            document.getElementById('f_endMsg').value = data.endMsg || '';

            document.getElementById('f_bigMsg').value = data.bigMsg || '';
            document.getElementById('f_bSticker1').value = data.bSticker1 || '';
            document.getElementById('f_bSticker2').value = data.bSticker2 || '';
            document.getElementById('f_bSticker3').value = data.bSticker3 || '';

            document.getElementById('f_smallMsg').value = data.smallMsg || '';
            document.getElementById('f_sSticker1').value = data.sSticker1 || '';
            document.getElementById('f_sSticker2').value = data.sSticker2 || '';
            document.getElementById('f_sSticker3').value = data.sSticker3 || '';

            document.getElementById('f_sendLoss').checked = data.sendLoss ?? true;
            document.getElementById('f_lossMsg').value = data.lossMsg || '';
            document.getElementById('f_lossSticker').value = data.lossSticker || '';

            const times = data.times || [];
            for(let i=0; i<10; i++) {
                document.getElementById(`f_t_start_${i}`).value = times[i]?.start || '';
                document.getElementById(`f_t_end_${i}`).value = times[i]?.end || '';
            }

            checkStatus();
            renderSidebar();
        };

        function checkStatus() {
            const isActive = document.getElementById('f_isActive').checked;
            const token = document.getElementById('f_botToken').value.trim();
            const chat = document.getElementById('f_chatId').value.trim();
            const badge = document.getElementById('channelStatusBadge');

            if (!isActive) {
                badge.innerHTML = '<span style="color:#ff003c;"><i class="fas fa-power-off"></i> BOT OFF</span>';
                badge.style.borderBottom = "2px solid #ff003c";
            } else if (!token || !chat) {
                badge.innerHTML = '<span style="color:#ffaa00;"><i class="fas fa-exclamation-triangle"></i> MISSING ID/TOKEN</span>';
                badge.style.borderBottom = "2px solid #ffaa00";
            } else {
                badge.innerHTML = '<span style="color:#00ff41; animation: pulse 1.5s infinite;"><i class="fas fa-broadcast-tower"></i> BOT ON & READY</span>';
                badge.style.borderBottom = "2px solid #00ff41";
            }
        }

        document.getElementById('f_isActive').addEventListener('change', checkStatus);
        document.getElementById('f_botToken').addEventListener('input', checkStatus);
        document.getElementById('f_chatId').addEventListener('input', checkStatus);

        document.getElementById('testConnectionBtn').addEventListener('click', async () => {
            const token = document.getElementById('f_botToken').value.trim();
            const chat = document.getElementById('f_chatId').value.trim();
            if(!token || !chat) return alert("Please enter Bot Token and Chat ID first!");
            try {
                let res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: chat, text: "✅ System Check: Bot is perfectly connected!" })
                });
                let json = await res.json();
                if(json.ok) alert("SUCCESS! Please check your Telegram channel.");
                else alert("FAILED! Error: " + json.description);
            } catch(e) { alert("Network Error."); }
        });

        document.getElementById('addChannelBtn').addEventListener('click', () => {
            let cName = prompt("Enter a Name for this Channel:", "New Channel");
            if(cName === null) return; 
            const newRef = push(channelsRef);
            set(newRef, { name: cName || 'Unnamed Channel', server: '30S', isActive: false, stopOnWinTarget: false, targetWins: 4, currentWins: 0, times: [] });
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            if(!currentEditingId) return;
            let times = [];
            for(let i=0; i<10; i++) {
                times.push({ start: document.getElementById(`f_t_start_${i}`).value, end: document.getElementById(`f_t_end_${i}`).value });
            }

            const dataToSave = {
                name: document.getElementById('f_channelName').value || 'Unnamed Channel',
                server: document.getElementById('f_server').value,
                isActive: document.getElementById('f_isActive').checked,
                botToken: document.getElementById('f_botToken').value,
                chatId: document.getElementById('f_chatId').value,
                signalMsg: document.getElementById('f_signalMsg').value,
                stopOnWinTarget: document.getElementById('f_stopOnWinTarget').checked,
                targetWins: parseInt(document.getElementById('f_targetWins').value) || 4,
                currentWins: parseInt(document.getElementById('f_currentWins').value) || 0,
                warningMsg: document.getElementById('f_warningMsg').value,
                endMsg: document.getElementById('f_endMsg').value,
                bigMsg: document.getElementById('f_bigMsg').value,
                bSticker1: document.getElementById('f_bSticker1').value,
                bSticker2: document.getElementById('f_bSticker2').value,
                bSticker3: document.getElementById('f_bSticker3').value,
                smallMsg: document.getElementById('f_smallMsg').value,
                sSticker1: document.getElementById('f_sSticker1').value,
                sSticker2: document.getElementById('f_sSticker2').value,
                sSticker3: document.getElementById('f_sSticker3').value,
                sendLoss: document.getElementById('f_sendLoss').checked,
                lossMsg: document.getElementById('f_lossMsg').value,
                lossSticker: document.getElementById('f_lossSticker').value,
                times: times
            };

            set(ref(db, 'channels/' + currentEditingId), dataToSave).then(()=> alert("Saved Successfully!"));
        });

        document.getElementById('resetWinsBtn').addEventListener('click', () => {
            if(!currentEditingId) return;
            update(ref(db, 'channels/' + currentEditingId), { currentWins: 0 });
            document.getElementById('f_currentWins').value = 0;
        });

        document.getElementById('deleteBtn').addEventListener('click', () => {
            if(confirm("Are you sure you want to delete this channel?")) {
                remove(ref(db, 'channels/' + currentEditingId));
                document.getElementById('mainContent').style.display = 'none';
                currentEditingId = null;
            }
        });
    </script>
</body>
</html>
